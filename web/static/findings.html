<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReconX - Findings</title>
  <link rel="stylesheet" href="/assets/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <header class="app-header">
    <h1>ReconX</h1>
    <nav class="app-nav">
      <a href="/">Dashboard</a>
      <a href="/scan_viewer.html">Scan Viewer</a>
      <a href="/findings.html" class="active">Findings</a>
      <a href="/graph_viewer.html">Attack Graph</a>
    </nav>
  </header>

  <main class="main">
    <div class="card">
      <h2>Select target</h2>
      <div style="display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap;">
        <select id="targetSelect" style="min-width: 220px;">
          <option value="">— Select target —</option>
        </select>
        <select id="severityFilter" style="width: 140px;">
          <option value="">All severities</option>
          <option value="critical">Critical</option>
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
          <option value="info">Info</option>
        </select>
        <button type="button" class="btn btn-primary" id="loadFindings">Load findings</button>
      </div>
    </div>

    <div class="card">
      <h2>Summary</h2>
      <div id="summaryLoading" class="empty-state">Select a target and load.</div>
      <div id="summaryGrid" class="stats-grid hidden"></div>
    </div>

    <div class="card">
      <h2>Findings</h2>
      <div id="findingsLoading" class="empty-state hidden">Loading…</div>
      <div id="findingsList" class="hidden">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Severity</th>
                <th>Name</th>
                <th>Host</th>
                <th>Tool</th>
                <th>CVE</th>
                <th>Info</th>
              </tr>
            </thead>
            <tbody id="findingsTableBody"></tbody>
          </table>
        </div>
      </div>
      <div id="findingsEmpty" class="empty-state hidden">
        <p>No findings for this target.</p>
      </div>
    </div>
  </main>

  <script src="/assets/js/findings.js"></script>
</body>
</html>
