<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReconX - Scan Viewer</title>
  <link rel="stylesheet" href="/assets/css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <header class="app-header">
    <h1>ReconX</h1>
    <nav class="app-nav">
      <a href="/">Dashboard</a>
      <a href="/scan_viewer.html" class="active">Scan Viewer</a>
      <a href="/findings.html">Findings</a>
      <a href="/graph_viewer.html">Attack Graph</a>
    </nav>
  </header>

  <main class="main">
    <div class="card">
      <h2>Scan status</h2>
      <div style="display: flex; gap: 1rem; flex-wrap: wrap; align-items: center;">
        <label style="color: var(--text-muted);">Scan / target:</label>
        <select id="scanSelect" style="min-width: 220px;">
          <option value="">— Select or type target —</option>
        </select>
        <input type="text" id="scanIdInput" placeholder="scan_... or target" style="min-width: 200px;">
        <button type="button" class="btn btn-secondary" id="refreshStatus">Refresh status</button>
      </div>
      <div id="statusCard" class="hidden" style="margin-top: 1rem;">
        <div class="stats-grid" style="grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));">
          <div class="stat-box">
            <div class="value" id="statusValue">—</div>
            <div class="label">Status</div>
          </div>
          <div class="stat-box">
            <div class="value" id="progressValue">0</div>
            <div class="label">Progress %</div>
          </div>
          <div class="stat-box">
            <div class="value" id="targetValue">—</div>
            <div class="label">Target</div>
          </div>
          <div class="stat-box">
            <div class="value" id="startedValue">—</div>
            <div class="label">Started</div>
          </div>
        </div>
        <p id="statusError" class="error-msg hidden"></p>
      </div>
    </div>

    <div class="card">
      <h2>Live log stream</h2>
      <p style="color: var(--text-muted); margin: 0 0 0.5rem 0;">Tail of reconx.log (updates when scan runs).</p>
      <div class="log-stream" id="logStream">
        <div class="line">Connecting…</div>
      </div>
      <div style="margin-top: 0.5rem;">
        <button type="button" class="btn btn-secondary" id="toggleLog">Pause stream</button>
      </div>
    </div>
  </main>

  <script src="/assets/js/scan_monitor.js"></script>
</body>
</html>
