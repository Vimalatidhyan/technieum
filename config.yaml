# Technieum Configuration File
# Customize settings for reconnaissance operations

# General Settings
general:
  output_dir: "output"
  database: "technieum.db"
  threads: 5
  timeout: 3600  # Timeout per phase in seconds
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"

# API Keys - set in .env (copy from .env.example)
# All keys are read from environment variables when running technieum or modules.
# Phase 1: SECURITYTRAILS_API_KEY, VT_API_KEY
# Phase 2: SHODAN_API_KEY, CENSYS_API_ID, CENSYS_API_SECRET, GITHUB_TOKEN
# Phase 3/4: PASTEBIN_API_KEY, WPSCAN_API_TOKEN
# Phase 5 / Threat intel: HIBP_API_KEY, ABUSEIPDB_API_KEY, GREYNOISE_API_KEY,
#   OTX_API_KEY, EMAILREP_API_KEY, PHISHTANK_APP_KEY, URLSCAN_API_KEY,
#   PULSEDIVE_API_KEY, BINARYEDGE_API_KEY, CROWDSEC_API_KEY, GSB_API_KEY
api_keys:
  shodan: "${SHODAN_API_KEY}"
  censys_id: "${CENSYS_API_ID}"
  censys_secret: "${CENSYS_API_SECRET}"
  github: "${GITHUB_TOKEN}"
  securitytrails: "${SECURITYTRAILS_API_KEY}"
  pastebin: "${PASTEBIN_API_KEY}"
  virustotal: "${VT_API_KEY}"
  wpscan: "${WPSCAN_API_TOKEN}"
  hibp: "${HIBP_API_KEY}"
  abuseipdb: "${ABUSEIPDB_API_KEY}"
  greynoise: "${GREYNOISE_API_KEY}"
  otx: "${OTX_API_KEY}"
  emailrep: "${EMAILREP_API_KEY}"
  urlscan: "${URLSCAN_API_KEY}"
  pulsedive: "${PULSEDIVE_API_KEY}"
  binaryedge: "${BINARYEDGE_API_KEY}"
  crowdsec: "${CROWDSEC_API_KEY}"
  safe_browsing: "${GSB_API_KEY}"

# Phase 1: Discovery Settings
phase1_discovery:
  enabled: true

  # Subdomain enumeration tools
  subdomain_tools:
    - sublist3r
    - amass
    - assetfinder
    - subfinder
    - subdominator
    - crtsh
    - securitytrails

  # DNS resolution
  dns_resolution:
    enabled: true
    tool: "dnsx"
    timeout: 10

  # HTTP validation
  http_validation:
    enabled: true
    tool: "httpx"
    threads: 50
    timeout: 10
    follow_redirects: true

  # Active discovery (always runs with bundled wordlist if no crt.sh/API keys)
  active_discovery:
    enabled: true
    # Priority: TECHNIEUM_SUBDOMAIN_WORDLIST env > data/wordlists/subdomains.txt (bundled) > seclists
    wordlist: "data/wordlists/subdomains.txt"  # bundled; override with /usr/share/seclists/... if installed

# Phase 2: Intelligence Settings
phase2_intel:
  enabled: true

  # Port scanning
  port_scanning:
    enabled: true
    fast_scan: true  # RustScan
    deep_scan: true  # Nmap
    nmap_flags: "-sV -sC -T4 -Pn"
    port_range: "1-65535"

  # OSINT
  osint:
    shodan: true
    censys: true
    shodan_limit: 100

  # Subdomain takeover
  takeover_detection:
    enabled: true
    tool: "subjack"

  # Repository scanning
  repo_scanning:
    enabled: true
    gitleaks: true
    trufflehog: true
    max_repos: 10

# Phase 3: Content Discovery Settings
phase3_content:
  enabled: true

  # Archive crawling
  archive_crawling:
    enabled: true
    tools:
      - gau
      - waybackurls
      - hakrawler
      - katana
    max_urls: 10000

  # Directory bruteforcing
  directory_bruteforce:
    enabled: true
    tools:
      - ffuf
      - feroxbuster
      - dirsearch
    wordlist: "/usr/share/seclists/Discovery/Web-Content/raft-medium-directories.txt"
    max_targets: 20  # Limit number of hosts to brute-force
    threads: 50

  # JavaScript analysis
  js_analysis:
    enabled: true
    linkfinder: true
    secretfinder: true
    max_js_files: 100

  # Pastebin monitoring
  pastebin:
    enabled: false
    api_required: true

  # API testing
  api_testing:
    enabled: true
    newman: true
    kiterunner: true
    arjun: true

# Phase 4: Vulnerability Scanning Settings
phase4_vulnscan:
  enabled: true

  # Nuclei
  nuclei:
    enabled: true
    severity: ["critical", "high", "medium", "low", "info"]
    templates: "all"
    rate_limit: 150
    update_templates: true

  # XSS scanning
  xss:
    enabled: true
    tool: "dalfox"
    max_urls: 100

  # SQL injection
  sqli:
    enabled: true
    tool: "sqlmap"
    max_urls: 30
    sqlmap_flags: "--batch --random-agent --level=1 --risk=1"

  # CORS misconfiguration
  cors:
    enabled: true
    tool: "corsy"

  # Additional scanners
  additional:
    nikto: false
    wpscan: true
    wapiti: false
    cmsmap: false
    retirejs: true

  # SSL/TLS scanning
  ssl_tls:
    enabled: true
    tool: "testssl"
    max_hosts: 10

# Logging Settings
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  file: "logs/technieum.log"
  console: true

# Output Settings
output:
  json: true
  html_report: false
  csv_export: false

# Performance Settings
performance:
  max_memory: "4GB"
  cache_enabled: true

# Notification Settings (Optional)
notifications:
  enabled: false
  slack_webhook: ""
  discord_webhook: ""
  email: ""

# Filter Settings
filters:
  exclude_extensions:
    - png
    - jpg
    - jpeg
    - gif
    - svg
    - css
    - woff
    - woff2
    - ttf
    - eot
    - ico

  exclude_status_codes:
    - 404
    - 400
    - 500
    - 502
    - 503

  exclude_patterns:
    - "logout"
    - "signout"
