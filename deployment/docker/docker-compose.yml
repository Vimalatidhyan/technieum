# Technieum Enterprise — Docker Compose
#
# Profiles:
#   dev   — SQLite, no external services (default for local dev)
#   prod  — PostgreSQL + Redis + API + Worker
#   tools — one-off CLI scanner (either profile)
#
# Usage:
#   # Local dev (SQLite)
#   docker compose -f deployment/docker/docker-compose.yml --profile dev up -d
#
#   # Production (PostgreSQL + Redis)
#   TECHNIEUM_SECRET_KEY=... POSTGRES_PASSWORD=... \
#   docker compose -f deployment/docker/docker-compose.yml --profile prod up -d

x-api-common: &api-common
  build:
    context: ../..
    dockerfile: deployment/docker/Dockerfile.api
  image: technieum-api:latest

x-worker-common: &worker-common
  build:
    context: ../..
    dockerfile: deployment/docker/Dockerfile.worker
  image: technieum-worker:latest

# ── DEV profile (SQLite, no external deps) ─────────────────────────────────

services:

  api-dev:
    <<: *api-common
    container_name: technieum-api-dev
    profiles: [dev]
    ports:
      - "8000:8000"
    volumes:
      - ../../output:/app/output
      - ../../logs:/app/logs
      - technieum-dev-data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=sqlite:////app/data/technieum.db
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
      - TECHNIEUM_SECRET_KEY=${TECHNIEUM_SECRET_KEY:-dev-insecure-key-change-in-prod}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  worker-dev:
    <<: *worker-common
    container_name: technieum-worker-dev
    profiles: [dev]
    volumes:
      - ../../output:/app/output
      - ../../logs:/app/logs
      - technieum-dev-data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=sqlite:////app/data/technieum.db
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
      - WORKER_POLL_SEC=${WORKER_POLL_SEC:-5}
      - WORKER_MAX_JOBS=${WORKER_MAX_JOBS:-1}
      - TECHNIEUM_NUCLEI_UPDATE=${TECHNIEUM_NUCLEI_UPDATE:-false}
    restart: unless-stopped
    depends_on:
      api-dev:
        condition: service_healthy

# ── PROD profile (PostgreSQL + Redis) ─────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: technieum-postgres
    profiles: [prod]
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-technieum}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-REQUIRED_IN_PROD}
      - POSTGRES_DB=${POSTGRES_DB:-technieum}
    volumes:
      - technieum-pg-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-technieum}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: technieum-redis
    profiles: [prod]
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - technieum-redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  api-prod:
    <<: *api-common
    container_name: technieum-api-prod
    profiles: [prod]
    ports:
      - "8000:8000"
    volumes:
      - ../../output:/app/output
      - ../../logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER:-technieum}:${POSTGRES_PASSWORD:-REQUIRED_IN_PROD}@postgres:5432/${POSTGRES_DB:-technieum}
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - TECHNIEUM_SECRET_KEY=${TECHNIEUM_SECRET_KEY:?TECHNIEUM_SECRET_KEY must be set}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  worker-prod:
    <<: *worker-common
    container_name: technieum-worker-prod
    profiles: [prod]
    volumes:
      - ../../output:/app/output
      - ../../logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER:-technieum}:${POSTGRES_PASSWORD:-REQUIRED_IN_PROD}@postgres:5432/${POSTGRES_DB:-technieum}
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - WORKER_POLL_SEC=${WORKER_POLL_SEC:-5}
      - WORKER_MAX_JOBS=${WORKER_MAX_JOBS:-4}
      - TECHNIEUM_NUCLEI_UPDATE=${TECHNIEUM_NUCLEI_UPDATE:-false}
    restart: unless-stopped
    depends_on:
      api-prod:
        condition: service_healthy

  # Optional: one-off CLI scanner (any profile)
  scanner:
    build:
      context: ../..
      dockerfile: deployment/docker/Dockerfile.scanner
    image: technieum-scanner:latest
    container_name: technieum-scanner
    profiles: [tools]
    volumes:
      - ../../output:/app/output
      - ../../config.yaml:/app/config.yaml
    environment:
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./technieum.db}
      - TECHNIEUM_NUCLEI_UPDATE=${TECHNIEUM_NUCLEI_UPDATE:-false}
    command: ["--help"]

volumes:
  technieum-dev-data:
    driver: local
  technieum-pg-data:
    driver: local
  technieum-redis-data:
    driver: local
