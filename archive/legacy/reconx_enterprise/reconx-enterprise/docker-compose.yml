version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: reconx-postgres
    environment:
      POSTGRES_USER: reconx
      POSTGRES_PASSWORD: reconx_dev
      POSTGRES_DB: reconx_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reconx"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - reconx_network

  # Redis Cache & Message Broker
  redis:
    image: redis:7-alpine
    container_name: reconx-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - reconx_network

  # FastAPI Backend
  api:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile.api
    container_name: reconx-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql://reconx:reconx_dev@postgres:5432/reconx_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./scanner:/app/scanner
    command: |
      bash -c "
        alembic upgrade head &&
        python -m uvicorn backend.api.server:app --host 0.0.0.0 --port 8000 --reload
      "
    networks:
      - reconx_network

  # Celery Worker
  worker:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile.api
    container_name: reconx-worker
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql://reconx:reconx_dev@postgres:5432/reconx_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - ./backend:/app/backend
    command: |
      celery -A backend.workers.celery_app worker --loglevel=debug
    networks:
      - reconx_network

  # Celery Flower (Monitoring)
  flower:
    image: mher/flower:2.0.1
    container_name: reconx-flower
    depends_on:
      redis:
        condition: service_healthy
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    ports:
      - "5555:5555"
    command: celery --broker=redis://redis:6379/1 flower
    networks:
      - reconx_network

  # React Frontend (Development)
  frontend:
    build:
      context: ./frontend/web
      dockerfile: Dockerfile.dev
    container_name: reconx-frontend
    depends_on:
      - api
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/web/src:/app/src
      - /app/node_modules
    environment:
      REACT_APP_API_URL: http://api:8000
      REACT_APP_ENV: development
    networks:
      - reconx_network

  # PgAdmin for Database Management (Optional)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: reconx-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@reconx.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - reconx_network

  # MeiliSearch for Full-Text Search (Optional)
  meilisearch:
    image: getmeili/meilisearch:v1.7
    container_name: reconx-meilisearch
    environment:
      MEILI_ENV: development
      MEILI_NO_ANALYTICS: true
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data
    networks:
      - reconx_network

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:

networks:
  reconx_network:
    driver: bridge
